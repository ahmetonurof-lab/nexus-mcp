# ================================================================
# .github/workflows/update-index.yml
# Push yapınca otomatik code index günceller ve commit'e ekler
# ================================================================
name: Update Code Index

on:
  push:
    paths:
      - 'sonnet/src/**.py'   # Sadece .py değişince çalış

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Commit push edebilmek için

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run update_index.py
        run: python update_index.py

      - name: Commit & Push index
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude_index/code_index.json
          git diff --staged --quiet || git commit -m "chore: auto-update code index [skip ci]"
          git push
